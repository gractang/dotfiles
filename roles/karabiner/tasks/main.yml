- name: Install Karabiner-Elements
  community.general.homebrew_cask:
    name: karabiner-elements
    state: present
    sudo_password: "{{ become_password }}"

# Karabiner config files
- name: Karabiner - Check if config exists
  stat:
    path: "{{ config }}/karabiner"
  register: karabiner_config_stat

- name: Karabiner - Back up config
  command: "mv {{ config }}/karabiner {{ config }}/karabiner_old"
  args:
    creates: "{{ config }}/karabiner_old"
  when: karabiner_config_stat.stat.exists

- name: Karabiner - Make sure config is up to date
  file:
    src: "{{ dotfiles_home }}/roles/karabiner/files/"
    dest: "{{ config }}/karabiner"
    state: link
    force: yes

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
