- name: Add ruby plugin
  command: asdf plugin add ruby
  register: ruby_add
  failed_when: ruby_add.rc not in [0, 2]

- name: Install ruby versions
  command: asdf install ruby {{item}}
  loop: "{{versions}}"
  register: ruby_install
  failed_when: ruby_install.rc != 0 and "is already installed" not in ruby_install.stderr

- name: Set global version for ruby to {{versions[0]}}
  command: "asdf set ruby {{versions[0]}}"

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
