- name: Add nodejs plugin
  command: asdf plugin add nodejs
  register: node_add
  failed_when: node_add.rc not in [0, 2]

- name: Install node versions
  command: asdf install nodejs {{item}}
  loop: "{{versions}}"
  register: node_install
  failed_when: node_install.rc != 0 and "is already installed" not in node_install.stderr

- name: Set global version for node to {{versions[0]}}
  command: "asdf set nodejs {{versions[0]}}"
  args:
    chdir: "{{ ansible_env.HOME }}"

- name: Resolve nodejs version
  shell: |
    version="{{ versions[0] }}"
    if [ "$version" = "latest" ]; then
      asdf latest nodejs
    else
      echo "$version"
    fi
  register: nodejs_resolved_version
  changed_when: false

- name: Record role in lockfile
  command: "{{ playbook_dir }}/bin/lock-role {{ ansible_role_name }}"
  changed_when: false
