# splitting
bind c new-window -c "#{pane_current_path}"
unbind %
bind h split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind v split-window -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"

bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# move pane between windows
bind-key M command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key m command-prompt -p "send pane to:"  "join-pane -t '%%'"

# select session
bind s choose-session -O name -F '#{session_windows} windows#{?session_attached, (attached),}#{?session_alerts, 🔔,}'

### --- Navigation with Ctrl+h/j/k/l ---
# @pane-is-vim is set by smart-splits.nvim; faster and more reliable than shell check
bind -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"

# --- Resize with option+= / option+- ---
bind -n M-= if -F "#{@pane-is-vim}" "send-keys M-=" "resize-pane -R 5"
bind -n M-- if -F "#{@pane-is-vim}" "send-keys M--" "resize-pane -L 5"

### --- Additional keys for navigation ---
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'M-\\' if -F '#{@pane-is-vim}' 'send-keys M-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'M-\\' if -F '#{@pane-is-vim}' 'send-keys M-\\\\'  'select-pane -l'"

bind-key -n 'M-Space' if -F "#{@pane-is-vim}" 'send-keys M-Space' 'select-pane -t:.+'

# copy-mode navigation
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'M-\' select-pane -l
bind-key -T copy-mode-vi 'M-Space' select-pane -t:.+

# copy-mode vi keybindings
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# zoom split
unbind z
bind z if -F "#{@pane-is-vim}" "send-keys ,z" "resize-pane -Z"
bind Z resize-pane -Z

# vim style commands
bind : command-prompt

# other random key-binding changes
bind x kill-pane
bind t set status

# Ctrl-g → open a centered popup running lazygit
bind-key -n C-g display-popup -E -w 90% -h 90% -S "border-style double" -d "#{pane_current_path}" lazygit

# cms - session/agent switcher
bind f display-popup -E -w 80% -h 70% "cms"
bind a display-popup -E -w 80% -h 70% "cms -a"
bind n run-shell "cms next -a"
